/* ─── Utility Components ─── */
const Avatar = ({ name, size = 40 }) => {
  const initials = name.split(" ").map(n => n[0]).join("").slice(0, 2);
  const colors = ["#1a1a2e", "#16213e", "#0f3460", "#533483", "#2c3e50", "#34495e"];
  const colorIndex = name.length % colors.length;
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", backgroundColor: colors[colorIndex], display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: size * 0.38, fontWeight: 600, letterSpacing: "0.5px", flexShrink: 0 }}>
      {initials}
    </div>
  );
};

const StarRating = ({ rating, size = 14 }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
    {[...Array(5)].map((_, i) => (
      <Star key={i} size={size} fill={i < Math.floor(rating) ? "#111" : "none"} stroke={i < Math.floor(rating) ? "#111" : "#ccc"} strokeWidth={1.5} />
    ))}
    <span style={{ marginLeft: 4, fontSize: size - 1, fontWeight: 500, color: "#111" }}>{rating}</span>
  </div>
);

const Badge = ({ children, variant = "default" }) => {
  const styles = {
    default: { background: "#f5f5f5", color: "#333" },
    success: { background: "#ecfdf5", color: "#059669" },
    warning: { background: "#fffbeb", color: "#d97706" },
    danger: { background: "#fef2f2", color: "#dc2626" },
    info: { background: "#eff6ff", color: "#2563eb" },
  };
  const s = styles[variant] || styles.default;
  return (
    <span style={{ ...s, padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: 500, display: "inline-block", whiteSpace: "nowrap" }}>
      {children}
    </span>
  );
};

const Button = ({ children, variant = "primary", size = "md", onClick, style: customStyle, disabled }) => {
  const base = { border: "none", cursor: disabled ? "not-allowed" : "pointer", fontWeight: 500, display: "inline-flex", alignItems: "center", gap: 6, transition: "all 0.15s", fontFamily: "inherit", opacity: disabled ? 0.5 : 1 };
  const variants = {
    primary: { ...base, background: "#111", color: "#fff", borderRadius: 8 },
    secondary: { ...base, background: "#f5f5f5", color: "#333", borderRadius: 8 },
    outline: { ...base, background: "transparent", color: "#333", border: "1px solid #ddd", borderRadius: 8 },
    ghost: { ...base, background: "transparent", color: "#555", borderRadius: 8 },
    danger: { ...base, background: "#dc2626", color: "#fff", borderRadius: 8 },
  };
  const sizes = { sm: { padding: "6px 12px", fontSize: 13 }, md: { padding: "10px 20px", fontSize: 14 }, lg: { padding: "14px 28px", fontSize: 15 } };
  return <button onClick={disabled ? undefined : onClick} style={{ ...variants[variant], ...sizes[size], ...customStyle }}>{children}</button>;
};

const Input = ({ label, ...props }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
    {label && <label style={{ fontSize: 13, fontWeight: 500, color: "#555" }}>{label}</label>}
    <input {...props} style={{ padding: "10px 14px", border: "1px solid #e0e0e0", borderRadius: 8, fontSize: 14, outline: "none", fontFamily: "inherit", transition: "border-color 0.15s", ...(props.style || {}) }} onFocus={e => e.target.style.borderColor = "#111"} onBlur={e => e.target.style.borderColor = "#e0e0e0"} />
  </div>
);

const Select = ({ label, options, value, onChange, placeholder }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
    {label && <label style={{ fontSize: 13, fontWeight: 500, color: "#555" }}>{label}</label>}
    <select value={value} onChange={e => onChange(e.target.value)} style={{ padding: "10px 14px", border: "1px solid #e0e0e0", borderRadius: 8, fontSize: 14, outline: "none", fontFamily: "inherit", background: "#fff", cursor: "pointer" }}>
      {placeholder && <option value="">{placeholder}</option>}
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

const Textarea = ({ label, ...props }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
    {label && <label style={{ fontSize: 13, fontWeight: 500, color: "#555" }}>{label}</label>}
    <textarea {...props} style={{ padding: "10px 14px", border: "1px solid #e0e0e0", borderRadius: 8, fontSize: 14, outline: "none", fontFamily: "inherit", resize: "vertical", minHeight: 100, ...(props.style || {}) }} />
  </div>
);

const Tabs = ({ tabs, active, onChange }) => (
  <div style={{ display: "flex", gap: 0, borderBottom: "1px solid #eee", marginBottom: 24 }}>
    {tabs.map(t => (
      <button key={t.id} onClick={() => onChange(t.id)} style={{ padding: "12px 20px", background: "none", border: "none", borderBottom: active === t.id ? "2px solid #111" : "2px solid transparent", color: active === t.id ? "#111" : "#999", fontWeight: active === t.id ? 600 : 400, fontSize: 14, cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s" }}>
        {t.label}
      </button>
    ))}
  </div>
);

const Modal = ({ open, onClose, title, children, width = 520 }) => {
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={onClose}>
      <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.4)", backdropFilter: "blur(4px)" }} />
      <div onClick={e => e.stopPropagation()} style={{ position: "relative", background: "#fff", borderRadius: 16, padding: 32, width: "90%", maxWidth: width, maxHeight: "85vh", overflowY: "auto", boxShadow: "0 25px 50px rgba(0,0,0,0.15)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <h2 style={{ fontSize: 20, fontWeight: 600, margin: 0 }}>{title}</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}><X size={20} /></button>
        </div>
        {children}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════

function App() {
  const [view, setView] = useState("landing");
  const [currentUser, setCurrentUser] = useState(null);

  const contextValue = useMemo(() => ({ view, setView, currentUser, setCurrentUser }), [view, currentUser]);

  const renderView = () => {
    if (view.startsWith("customer-trader-")) {
      const id = parseInt(view.split("-").pop());
      return <CustomerTraderProfile traderId={id} />;
    }
    switch (view) {
      case "landing": return <LandingPage />;
      case "customer-home": return <CustomerHome />;
      case "customer-post-job": return <CustomerPostJob />;
      case "customer-my-jobs": return <CustomerMyJobs />;
      case "trader-dashboard": return <TraderDashboard />;
      case "admin-dashboard": return <AdminDashboard />;
      default: return <LandingPage />;
    }
  };

  return (
    <AppContext.Provider value={contextValue}>
      <style>{`
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fafafa; -webkit-font-smoothing: antialiased; }
        ::selection { background: #111; color: #fff; }
        input:focus, select:focus, textarea:focus { border-color: #111 !important; }
        button:hover { opacity: 0.9; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
      `}</style>
      {renderView()}
    </AppContext.Provider>
  );
}

    // Mount
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
